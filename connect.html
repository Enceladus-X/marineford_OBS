<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Marineford Tablet Connect</title>
<style>
  :root {
    --bg:#07080d;
    --panel:#121622;
    --panel2:#191e2c;
    --gold:#d8b85a;
    --text:#f7f7f4;
    --muted:rgba(247,247,244,.68);
    --line:rgba(216,184,90,.28);
    --green:#34a66f;
    --red:#d14a50;
  }
  * { box-sizing:border-box; }
  body {
    margin:0;
    min-height:100vh;
    background:var(--bg);
    color:var(--text);
    font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    display:grid;
    place-items:center;
    padding:28px;
  }
  main {
    width:min(980px,100%);
    display:grid;
    grid-template-columns:minmax(280px,420px) minmax(0,1fr);
    gap:28px;
    align-items:center;
  }
  .qr-panel {
    background:#fff;
    border-radius:8px;
    padding:22px;
    display:grid;
    place-items:center;
    min-height:420px;
  }
  .qr-panel img { width:100%; max-width:360px; aspect-ratio:1; display:block; }
  .info {
    min-width:0;
    display:grid;
    gap:16px;
  }
  h1 {
    margin:0;
    color:var(--gold);
    font-size:clamp(32px,5vw,62px);
    line-height:1;
    letter-spacing:0;
  }
  .subtitle {
    margin:0;
    color:var(--muted);
    font-size:18px;
    font-weight:800;
  }
  .url-box {
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:8px;
    padding:16px;
    display:grid;
    gap:8px;
  }
  .label {
    color:var(--muted);
    font-size:13px;
    font-weight:900;
  }
  .url {
    overflow-wrap:anywhere;
    font-size:clamp(22px,3vw,34px);
    font-weight:900;
  }
  .status {
    background:var(--panel2);
    border:1px solid var(--line);
    border-radius:8px;
    padding:14px 16px;
    color:var(--muted);
    font-size:15px;
    font-weight:800;
  }
  .status.ok { color:#93e0b8; border-color:rgba(52,166,111,.5); }
  .status.err { color:#ff9ca1; border-color:rgba(209,74,80,.5); }
  .actions {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
  }
  button, a.button {
    min-height:52px;
    border:0;
    border-radius:7px;
    padding:0 16px;
    background:var(--gold);
    color:#191300;
    font:inherit;
    font-weight:900;
    cursor:pointer;
    text-decoration:none;
    display:grid;
    place-items:center;
    text-align:center;
  }
  .ghost {
    background:var(--panel2);
    border:1px solid var(--line);
    color:var(--text);
  }
  .help {
    margin:0;
    color:var(--muted);
    font-size:14px;
    line-height:1.65;
  }
  @media (max-width:820px) {
    body { padding:16px; }
    main { grid-template-columns:1fr; }
    .qr-panel { min-height:auto; }
    .actions { grid-template-columns:1fr; }
  }
</style>
</head>
<body>
<main>
  <section class="qr-panel">
    <img id="qr" alt="Tablet connection QR code">
  </section>
  <section class="info">
    <div>
      <h1>태블릿 연결</h1>
      <p class="subtitle">태블릿 카메라로 QR을 스캔하면 바로 패널이 열립니다.</p>
    </div>

    <div class="url-box">
      <div class="label">Tablet URL</div>
      <div class="url" id="tablet-url">주소 확인 중...</div>
    </div>

    <div class="actions">
      <a class="button" id="open-tablet" href="#" target="_blank" rel="noreferrer">태블릿 패널 열기</a>
      <button class="ghost" type="button" onclick="loadInfo()">새로고침</button>
    </div>

    <div class="status" id="status">서버 연결 정보를 불러오는 중입니다.</div>
    <p class="help">
      태블릿과 송출컴은 같은 Wi-Fi 또는 같은 공유기에 연결되어 있어야 합니다.
      Windows 방화벽 알림이 뜨면 Python의 개인 네트워크 접근을 허용하세요.
    </p>
  </section>
</main>

<script>
const $ = (id) => document.getElementById(id);

async function loadInfo() {
  $('status').className = 'status';
  $('status').textContent = '서버 연결 정보를 불러오는 중입니다.';
  try {
    const res = await fetch('/api/connect-info?_=' + Date.now());
    const info = await res.json();
    const tabletUrl = info.tabletUrl;
    $('tablet-url').textContent = tabletUrl;
    $('open-tablet').href = tabletUrl;
    $('qr').src = '/api/qr.svg?text=' + encodeURIComponent(tabletUrl) + '&_=' + Date.now();
    $('status').className = 'status ok';
    $('status').textContent = `${info.host}:${info.port} 로 태블릿을 연결합니다.`;
  } catch (error) {
    $('status').className = 'status err';
    $('status').textContent = '연결 정보를 불러오지 못했습니다. 서버 창을 확인하세요.';
  }
}

loadInfo();
setInterval(loadInfo, 10000);
</script>
</body>
</html>
