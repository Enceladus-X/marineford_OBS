<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Marineford OBS 송출 미리보기</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root { --gold:#c9a84c; --gold2:#efd36d; --text:#f7f4ea; --muted:rgba(247,244,234,.62); }
  * { box-sizing:border-box; }
  html, body { margin:0; width:100%; height:100%; overflow:hidden; background:#050506; color:var(--text); font-family:'Noto Sans KR',system-ui,sans-serif; }
  .stage { position:relative; width:100vw; height:100vh; overflow:hidden; background:#f4f3ee; }
  .overlay { position:relative; width:1920px; height:1080px; transform-origin:top left; overflow:hidden; }
  .overlay::before {
    content:"";
    position:absolute;
    inset:0;
    background:
      linear-gradient(90deg,rgba(5,5,6,.06) 1px,transparent 1px),
      linear-gradient(rgba(5,5,6,.045) 1px,transparent 1px),
      linear-gradient(135deg,#faf9f4 0%,#efeee8 48%,#f7f6f0 100%);
    background-size:96px 96px,96px 96px,100% 100%;
  }
  .demo-watermark { position:absolute; left:50%; top:55%; transform:translate(-50%,-50%); color:rgba(5,5,6,.055); font-size:88px; font-weight:900; letter-spacing:.08em; text-align:center; }
  .top { position:absolute; left:50px; right:50px; top:18px; display:grid; grid-template-columns:minmax(0,1fr) 560px minmax(0,1fr); gap:32px; align-items:start; z-index:6; }
  .player { min-width:0; padding-top:8px; }
  .player.right { text-align:right; }
  .name { min-width:0; font-size:58px; font-weight:900; line-height:1; text-shadow:0 4px 14px rgba(0,0,0,.9); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .deck-name { min-height:44px; color:var(--gold2); font-size:36px; line-height:1.1; font-weight:900; margin-top:12px; text-shadow:0 3px 10px rgba(0,0,0,.85); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .center { display:grid; justify-items:center; gap:6px; min-width:560px; }
  #timer-display { font-family:'Bebas Neue',sans-serif; color:var(--gold2); font-size:78px; line-height:.86; letter-spacing:0; text-shadow:0 4px 12px rgba(0,0,0,.85); }
  #timer-display.warning { color:#ffbc73; }
  #timer-display.danger { color:#ff7078; animation:pulse .8s infinite; }
  #phase-display { color:var(--muted); font-size:30px; font-weight:900; text-shadow:0 2px 8px rgba(0,0,0,.8); }
  #tournament-name { color:var(--gold); font-size:26px; font-weight:900; text-shadow:0 2px 8px rgba(0,0,0,.85); }
  .score { position:absolute; left:50%; top:132px; transform:translateX(-50%); display:flex; gap:18px; align-items:center; font-family:'Bebas Neue',sans-serif; font-size:96px; line-height:.8; text-shadow:0 5px 16px rgba(0,0,0,.9); z-index:5; }
  .score .sep { color:var(--gold); }
  .image-side { position:absolute; top:250px; bottom:42px; width:330px; display:grid; z-index:3; }
  .image-side.left { left:42px; }
  .image-side.right { right:42px; }
  .image-slot { border:2px solid rgba(201,168,76,.38); border-radius:10px; background:rgba(8,9,14,.62); overflow:hidden; display:grid; place-items:center; box-shadow:0 14px 42px rgba(0,0,0,.28); }
  .image-slot img { width:100%; height:100%; object-fit:cover; }
  #phase-banner { position:absolute; left:0; right:0; top:50%; transform:translateY(-50%); min-height:190px; display:none; align-items:center; justify-content:center; flex-direction:column; gap:14px; background:rgba(0,0,0,.82); border-top:2px solid rgba(201,168,76,.62); border-bottom:2px solid rgba(201,168,76,.62); z-index:20; text-align:center; backdrop-filter:blur(2px); }
  #phase-banner.show { display:flex; }
  #phase-banner.full { inset:0; top:0; transform:none; min-height:auto; background:rgba(0,0,0,.93); border:0; }
  .banner-main { font-size:92px; font-weight:900; letter-spacing:.02em; text-shadow:0 8px 22px rgba(0,0,0,.9); }
  .banner-sub { color:var(--gold2); font-family:'Bebas Neue',sans-serif; font-size:42px; letter-spacing:.12em; }
  .demo-label { position:absolute; right:28px; bottom:24px; z-index:30; padding:8px 10px; border:1px solid rgba(201,168,76,.3); border-radius:6px; background:rgba(5,5,6,.62); color:rgba(247,244,234,.72); font-size:14px; font-weight:900; letter-spacing:.02em; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.52} }
</style>
</head>
<body>
<div class="stage">
  <div class="overlay" id="overlay">
    <div class="demo-watermark">BROADCAST PREVIEW</div>
    <div class="top">
      <div class="player">
        <div class="name" id="p1-name"></div>
        <div class="deck-name" id="p1-deck"></div>
      </div>
      <div class="center">
        <div id="timer-display">40:00</div>
        <div id="phase-display">대기중 · 1세트</div>
        <div id="tournament-name"></div>
      </div>
      <div class="player right">
        <div class="name" id="p2-name"></div>
        <div class="deck-name" id="p2-deck"></div>
      </div>
    </div>

    <div class="score"><span id="score-left">0</span><span class="sep">:</span><span id="score-right">0</span></div>

    <div class="image-side left">
      <div class="image-slot"><img id="left-img-1" alt="좌측 플레이어 샘플 덱 이미지"></div>
    </div>
    <div class="image-side right">
      <div class="image-slot"><img id="right-img-1" alt="우측 플레이어 샘플 덱 이미지"></div>
    </div>

    <div id="phase-banner">
      <div class="banner-main" id="phase-banner-main">사이드 교체중</div>
      <div class="banner-sub" id="phase-banner-sub">NEXT SET READY</div>
    </div>
    <div class="demo-label">STATIC DEMO</div>
  </div>
</div>

<script>
const labels = {
  idle: '대기중',
  round_waiting: '다음 라운드 대기중',
  dueling: '듀얼중',
  sideboarding: '사이드덱 교체중',
  finished: '매치 종료',
  judge_call: '저지 호출 중'
};

const demoImages = {
  left: svgPoster('SAMPLE DECK A', '#e7efff', '#4f5fe6', '#161a3d'),
  right: svgPoster('SAMPLE DECK B', '#fff2d7', '#d64e59', '#2d0f17')
};

const baseState = {
  p1Name: '해군본부',
  p1Deck: '블루 컨트롤',
  p2Name: '혁명군',
  p2Deck: '레드 어그로',
  tournamentName: 'MARINEFORD STORE CHAMPIONSHIP',
  scoreLeft: 1,
  scoreRight: 0,
  currentSet: 2,
  timerSeconds: 2237,
  timerRunning: true,
  extraTurnSeconds: 900,
  leftImg1: demoImages.left,
  rightImg1: demoImages.right
};

const demos = {
  duel: { ...baseState, phase: 'dueling', timerSeconds: 2237, timerRunning: true },
  side: { ...baseState, phase: 'sideboarding', timerSeconds: 0, timerRunning: false, scoreLeft: 1, scoreRight: 1 },
  judge: { ...baseState, phase: 'judge_call', timerSeconds: 1344, timerRunning: false },
  standby: { ...baseState, phase: 'round_waiting', timerSeconds: 2400, timerRunning: false, scoreLeft: 0, scoreRight: 0, currentSet: 1 },
  finished: { ...baseState, phase: 'finished', timerSeconds: 0, timerRunning: false, scoreLeft: 2, scoreRight: 1 }
};

let remainingSeconds = 2400;
let timerInterval = null;
let activeState = null;

function $(id) {
  return document.getElementById(id);
}

function scaleOverlay() {
  const scale = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
  $('overlay').style.transform = `scale(${scale})`;
}

function getDemoName() {
  const params = new URLSearchParams(window.location.search);
  return params.get('demo') || 'duel';
}

function applyState(s) {
  activeState = s;
  $('p1-name').textContent = s.p1Name || '';
  $('p2-name').textContent = s.p2Name || '';
  $('p1-deck').textContent = s.p1Deck || '';
  $('p2-deck').textContent = s.p2Deck || '';
  $('tournament-name').textContent = s.tournamentName || '';
  $('score-left').textContent = s.scoreLeft ?? 0;
  $('score-right').textContent = s.scoreRight ?? 0;
  $('left-img-1').src = s.leftImg1;
  $('right-img-1').src = s.rightImg1;
  remainingSeconds = s.timerSeconds ?? 2400;
  updateTimerDisplay();
  applyPhase(s);
  clearInterval(timerInterval);
  if (s.timerRunning) timerInterval = setInterval(() => {
    remainingSeconds -= 1;
    updateTimerDisplay();
  }, 1000);
}

function applyPhase(s) {
  const phase = s.phase || 'idle';
  $('phase-display').textContent = `${labels[phase] || labels.idle} · ${s.currentSet || 1}세트`;
  const banner = $('phase-banner');
  banner.classList.toggle('show', ['sideboarding', 'finished', 'round_waiting', 'judge_call'].includes(phase));
  banner.classList.toggle('full', phase === 'finished' || phase === 'round_waiting');
  if (phase === 'finished') {
    $('phase-banner-main').textContent = '매치 종료';
    $('phase-banner-sub').textContent = `${s.scoreLeft ?? 0} : ${s.scoreRight ?? 0}`;
  } else if (phase === 'round_waiting') {
    $('phase-banner-main').textContent = '다음 라운드 대기중';
    $('phase-banner-sub').textContent = 'WAITING FOR NEXT ROUND';
  } else if (phase === 'judge_call') {
    $('phase-banner-main').textContent = '저지 호출 중';
    $('phase-banner-sub').textContent = 'JUDGE CALL';
  } else {
    $('phase-banner-main').textContent = '사이드 교체중';
    $('phase-banner-sub').textContent = 'NEXT SET READY';
  }
}

function updateTimerDisplay() {
  const value = Math.floor(remainingSeconds || 0);
  const abs = Math.abs(value);
  const text = (value < 0 ? '-' : '') + String(Math.floor(abs / 60)).padStart(2,'0') + ':' + String(abs % 60).padStart(2,'0');
  const el = $('timer-display');
  el.textContent = text;
  el.classList.toggle('danger', value <= 0);
  el.classList.toggle('warning', value > 0 && value <= 180);
}

function svgPoster(title, base, accent, deep) {
  const svg = `
  <svg xmlns="http://www.w3.org/2000/svg" width="720" height="1600" viewBox="0 0 720 1600">
    <defs>
      <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
        <stop offset="0" stop-color="${base}"/>
        <stop offset=".5" stop-color="${accent}"/>
        <stop offset="1" stop-color="${deep}"/>
      </linearGradient>
      <pattern id="grid" width="72" height="72" patternUnits="userSpaceOnUse">
        <path d="M72 0H0V72" fill="none" stroke="rgba(255,255,255,.16)" stroke-width="2"/>
      </pattern>
      <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="black" flood-opacity=".35"/>
      </filter>
    </defs>
    <rect width="720" height="1600" fill="url(#bg)"/>
    <rect width="720" height="1600" fill="url(#grid)" opacity=".55"/>
    <path d="M-80 1260C120 1020 242 1026 402 820C548 632 594 424 794 282" fill="none" stroke="rgba(255,255,255,.62)" stroke-width="58" stroke-linecap="round"/>
    <path d="M-58 1198C170 1036 208 850 360 732C506 618 556 436 778 220" fill="none" stroke="rgba(0,0,0,.28)" stroke-width="28" stroke-linecap="round"/>
    <path d="M92 368L608 214L518 860L646 1308L184 1418L262 916Z" fill="rgba(255,255,255,.22)" stroke="rgba(255,255,255,.5)" stroke-width="5" filter="url(#shadow)"/>
    <path d="M144 444L540 326L474 834L566 1224L218 1308L284 900Z" fill="rgba(5,5,6,.34)" stroke="rgba(255,255,255,.18)" stroke-width="4"/>
    <circle cx="520" cy="512" r="118" fill="rgba(255,255,255,.2)" stroke="rgba(255,255,255,.42)" stroke-width="6"/>
    <path d="M198 1052C268 946 364 922 462 1010C372 1068 316 1172 258 1296C228 1206 202 1130 198 1052Z" fill="rgba(255,255,255,.34)"/>
    <text x="56" y="134" fill="rgba(255,255,255,.88)" font-family="Arial, sans-serif" font-size="44" font-weight="900" letter-spacing="3">${title}</text>
    <text x="56" y="1480" fill="rgba(255,255,255,.72)" font-family="Arial, sans-serif" font-size="34" font-weight="900" letter-spacing="8">MARINEFORD</text>
  </svg>`;
  return 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(svg);
}

window.addEventListener('resize', scaleOverlay);
scaleOverlay();
applyState(demos[getDemoName()] || demos.duel);
</script>
</body>
</html>
