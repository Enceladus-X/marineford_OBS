<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Marineford OBS 패널 미리보기</title>
<style>
  :root {
    --ink:#142230; --muted:#6f7e8b; --line:#d8e0e7; --paper:#f4f7f9;
    --navy:#10283a; --blue:#2f68e8; --cyan:#38b6d8; --gold:#e2b94f;
  }
  * { box-sizing:border-box; }
  html,body { width:100%; height:100%; margin:0; overflow:hidden; background:#0b1117; font-family:"Noto Sans KR","Malgun Gothic",system-ui,sans-serif; }
  button { font:inherit; }
  #viewport { position:relative; width:100vw; height:100vh; overflow:hidden; background:#0b1117; }
  #stage { width:1920px; height:1080px; transform-origin:top left; overflow:hidden; background:var(--paper); color:var(--ink); }
  .app-top { height:86px; display:flex; align-items:center; justify-content:space-between; padding:0 38px; color:#fff; background:#0c2232; }
  .brand { display:flex; align-items:center; gap:14px; }
  .brand-mark { width:44px; height:44px; display:grid; place-items:center; border:1px solid rgba(255,255,255,.2); border-radius:9px; color:#0b1721; background:var(--gold); font-size:17px; font-weight:1000; }
  .brand strong { display:block; font-size:20px; letter-spacing:.02em; }
  .brand span,.top-note { color:#a9bdca; font-size:13px; font-weight:750; }
  .status { display:flex; align-items:center; gap:9px; border:1px solid rgba(255,255,255,.12); border-radius:7px; padding:10px 14px; background:rgba(255,255,255,.05); font-size:14px; font-weight:850; }
  .status i { width:9px; height:9px; border-radius:50%; background:#4ed5a5; box-shadow:0 0 0 5px rgba(78,213,165,.12); }
  .workspace { height:994px; display:grid; grid-template-columns:230px minmax(0,1fr); }
  .side { padding:28px 18px; color:#adc0cd; background:#0f2839; }
  .side h2 { margin:0 12px 22px; color:#fff; font-size:18px; }
  .nav-item { display:flex; align-items:center; gap:11px; min-height:48px; margin:5px 0; border-radius:7px; padding:0 14px; font-size:14px; font-weight:800; }
  .nav-item::before { content:""; width:9px; height:9px; border:2px solid currentColor; border-radius:2px; }
  .nav-item.active { color:#fff; background:#244b64; box-shadow:inset 3px 0 var(--gold); }
  .main { min-width:0; overflow:hidden; padding:26px; background:#eef3f6; }
  .page-head { height:68px; display:flex; align-items:center; justify-content:space-between; margin-bottom:18px; }
  .page-head h1 { margin:0 0 5px; font-size:28px; letter-spacing:-.04em; }
  .page-head p { margin:0; color:var(--muted); font-size:14px; font-weight:700; }
  .actions { display:flex; gap:9px; }
  .btn { min-height:42px; border:1px solid #c7d2dc; border-radius:7px; padding:0 16px; color:#405568; background:#fff; font-weight:850; }
  .btn.primary { border-color:#1e5577; color:#fff; background:#1e5577; }
  .panel { overflow:hidden; border:1px solid var(--line); border-radius:11px; background:#fff; box-shadow:0 10px 28px rgba(19,47,64,.06); }
  .panel-head { min-height:64px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--line); padding:0 20px; }
  .panel-head strong { font-size:17px; }
  .panel-head span { color:var(--muted); font-size:12px; font-weight:750; }
  .control-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  .connection-grid { display:grid; grid-template-columns:1.1fr .9fr; gap:14px; padding:18px; }
  .connection-card { min-height:138px; display:grid; grid-template-columns:1fr auto; gap:18px; align-items:center; border:1px solid #dbe3e9; border-radius:9px; padding:18px; background:#f8fafb; }
  .connection-card b { display:block; margin-bottom:8px; color:#193b53; font-size:16px; }
  .connection-card code { display:block; border:1px solid #cbd8e1; border-radius:6px; padding:12px; color:#28526c; background:#fff; font:750 13px/1.4 Consolas,monospace; }
  .qr { width:96px; height:96px; border:8px solid white; background:repeating-conic-gradient(#0e2d41 0 25%,#fff 0 50%) 50%/18px 18px; box-shadow:0 0 0 1px #cad6de; }
  .setup-grid { display:grid; grid-template-columns:.8fr 1.2fr; gap:14px; margin-top:16px; }
  .fields { display:grid; grid-template-columns:1fr 1fr; gap:12px; padding:18px; }
  .field { min-height:66px; border:1px solid #d4dee5; border-radius:7px; padding:10px 12px; background:#f9fbfc; }
  .field label { display:block; margin-bottom:7px; color:#718291; font-size:11px; font-weight:850; }
  .field strong { font-size:15px; }
  .players { display:grid; grid-template-columns:1fr 1fr; gap:14px; padding:18px; }
  .player-card { display:grid; grid-template-columns:82px 1fr; gap:15px; border:1px solid #d4dee5; border-radius:8px; padding:15px; background:#f8fafb; }
  .deck-art { min-height:112px; border-radius:7px; background:linear-gradient(140deg,#58c5d9,#3154a8 52%,#151c3c); box-shadow:inset 0 0 0 1px rgba(255,255,255,.28); }
  .player-card:nth-child(2) .deck-art { background:linear-gradient(140deg,#f2cc68,#cb4e5d 52%,#421623); }
  .player-card h3 { margin:4px 0 8px; font-size:18px; }
  .player-card p { margin:5px 0; color:var(--muted); font-size:13px; font-weight:700; }

  .tablet-scene { height:994px; display:grid; place-items:center; padding:30px; background:radial-gradient(circle at 50% -20%,#274c67,#0a1d2b 58%,#07131d); }
  .tablet-frame { width:1540px; height:850px; overflow:hidden; border:12px solid #15222d; border-radius:42px; color:#fff; background:linear-gradient(145deg,#102c40,#0b1f2e); box-shadow:0 36px 80px rgba(0,0,0,.45),inset 0 0 0 1px rgba(255,255,255,.1); }
  .tablet-top { height:112px; display:grid; grid-template-columns:1fr auto 1fr; align-items:center; border-bottom:1px solid rgba(255,255,255,.1); padding:0 36px; }
  .tablet-top h1 { margin:0; color:#efd36d; font-size:52px; letter-spacing:.02em; }
  .tablet-top button { justify-self:end; border:1px solid #e6a0a6; border-radius:8px; padding:14px 20px; color:#ffccd0; background:#7b2630; font-weight:900; }
  .match-grid { height:590px; display:grid; grid-template-columns:1fr 330px 1fr; gap:26px; padding:34px; }
  .tablet-player { display:grid; place-items:center; align-content:center; gap:20px; border:1px solid rgba(255,255,255,.12); border-radius:20px; background:rgba(255,255,255,.045); }
  .tablet-player span { color:#91aec1; font-size:18px; font-weight:800; }
  .tablet-player strong { font-size:42px; }
  .tablet-player em { color:#efd36d; font-size:24px; font-style:normal; font-weight:850; }
  .scoreboard { display:grid; place-items:center; align-content:center; gap:18px; }
  .scoreboard span { color:#9cb3c1; font-weight:800; }
  .scoreboard strong { font-size:112px; line-height:1; }
  .scoreboard button { min-width:260px; min-height:74px; border:0; border-radius:14px; color:#102333; background:#efd36d; font-size:25px; font-weight:950; }
  .tablet-bottom { height:124px; display:grid; grid-template-columns:1fr 1fr; gap:18px; padding:18px 34px; background:rgba(0,0,0,.18); }
  .tablet-bottom button { border:1px solid rgba(255,255,255,.13); border-radius:13px; color:#fff; background:#234d68; font-size:21px; font-weight:900; }

  .editor-layout { display:grid; grid-template-columns:1.25fr .75fr; gap:16px; }
  .metrics { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:16px; }
  .metric { border:1px solid var(--line); border-radius:9px; padding:18px; background:#fff; }
  .metric span { color:var(--muted); font-size:12px; font-weight:800; }
  .metric strong { display:block; margin-top:8px; color:#173b53; font-size:28px; }
  table { width:100%; border-collapse:collapse; }
  th,td { height:60px; border-bottom:1px solid #e1e7ec; padding:0 18px; text-align:left; font-size:13px; }
  th { height:48px; color:#687b89; background:#f2f6f8; font-size:11px; letter-spacing:.06em; }
  td strong { color:#173b53; }
  .log-list { margin:0; padding:8px 18px 18px; list-style:none; }
  .log-list li { position:relative; min-height:68px; border-bottom:1px solid #e1e7ec; padding:14px 12px 12px 31px; }
  .log-list li::before { content:""; position:absolute; left:7px; top:21px; width:9px; height:9px; border-radius:50%; background:#2f68e8; box-shadow:0 0 0 5px #e8efff; }
  .log-list strong { display:block; margin-bottom:6px; font-size:13px; }
  .log-list span { color:var(--muted); font-size:12px; }
  .demo-tag { position:fixed; right:18px; bottom:16px; z-index:10; border:1px solid rgba(255,255,255,.14); border-radius:6px; padding:8px 10px; color:#c8d4dc; background:rgba(7,16,23,.78); font-size:12px; font-weight:900; letter-spacing:.06em; }
</style>
</head>
<body>
<div id="viewport"><div id="stage"></div></div>
<div class="demo-tag">STATIC PANEL DEMO</div>
<script>
  const screen = new URLSearchParams(location.search).get('screen') || 'control';
  const stage = document.getElementById('stage');

  function shell(title, subtitle, content, active) {
    return `<header class="app-top"><div class="brand"><div class="brand-mark">MF</div><div><strong>MARINEFORD OBS</strong><span>Broadcast operations console</span></div></div><div class="status"><i></i> 로컬 데모 연결됨</div></header><div class="workspace"><aside class="side"><h2>송출 운영</h2>${['컨트롤 홈','OBS 연결','대회 · 룰','플레이어 · 덱','프리셋 · 백업'].map(item => `<div class="nav-item ${item===active?'active':''}">${item}</div>`).join('')}</aside><main class="main"><div class="page-head"><div><h1>${title}</h1><p>${subtitle}</p></div><div class="actions"><button class="btn">백업</button><button class="btn primary">설정 저장</button></div></div>${content}</main></div>`;
  }

  function control() {
    const connection = `<section class="panel"><div class="panel-head"><strong>OBS 화면 연결</strong><span>권장 브라우저 소스 1920 × 1080</span></div><div class="connection-grid"><div class="connection-card"><div><b>송출 화면 URL</b><code>http://127.0.0.1:8000/overlay.html</code></div><button class="btn">URL 복사</button></div><div class="connection-card"><div><b>태블릿 연결</b><code>http://192.168.0.12:8000/tablet.html</code></div><div class="qr"></div></div></div></section>`;
    const rule = `<section class="panel"><div class="panel-head"><strong>대회 및 룰 설정</strong><span>프리셋 불러오기</span></div><div class="fields"><div class="field"><label>대회명</label><strong>MARINEFORD STORE CHAMPIONSHIP</strong></div><div class="field"><label>매치 방식</label><strong>BO3 · 40분</strong></div><div class="field"><label>엑스트라 턴</label><strong>15분</strong></div><div class="field"><label>현재 라운드</label><strong>Round 4</strong></div></div></section>`;
    const players = `<section class="panel"><div class="panel-head"><strong>플레이어 · 덱 이미지</strong><span>저장된 프리셋 자동 적용</span></div><div class="players"><article class="player-card"><div class="deck-art"></div><div><span>LEFT</span><h3>해군본부</h3><p>블루 컨트롤</p><p>1승 · 2세트</p></div></article><article class="player-card"><div class="deck-art"></div><div><span>RIGHT</span><h3>혁명군</h3><p>레드 어그로</p><p>0승 · 2세트</p></div></article></div></section>`;
    return shell('송출용 컨트롤 패널','OBS 연결, 현장 태블릿, 룰과 덱 프리셋을 한 화면에서 준비합니다.',`${connection}<div class="setup-grid">${rule}${players}</div>`,'컨트롤 홈');
  }

  function tablet() {
    return `<div class="tablet-scene"><div class="tablet-frame"><div class="tablet-top"><span class="top-note">ROUND 4 · SET 2</span><h1>37:16</h1><button>저지 호출</button></div><div class="match-grid"><article class="tablet-player"><span>LEFT PLAYER</span><strong>해군본부</strong><em>블루 컨트롤</em></article><div class="scoreboard"><span>듀얼 진행중</span><strong>1 : 0</strong><button>승패 보고</button></div><article class="tablet-player"><span>RIGHT PLAYER</span><strong>혁명군</strong><em>레드 어그로</em></article></div><div class="tablet-bottom"><button>왼쪽 플레이어 정보</button><button>오른쪽 플레이어 정보</button></div></div></div>`;
  }

  function editor() {
    const metrics = `<div class="metrics"><article class="metric"><span>현재 상태</span><strong>듀얼중</strong></article><article class="metric"><span>현재 세트</span><strong>2 SET</strong></article><article class="metric"><span>스코어</span><strong>1 : 0</strong></article><article class="metric"><span>듀얼 구간</span><strong>3개</strong></article></div>`;
    const rounds = `<section class="panel"><div class="panel-head"><strong>듀얼 구간</strong><span>편집용 시작 · 종료 지점</span></div><table><thead><tr><th>세트</th><th>시작</th><th>종료</th><th>승자</th><th>길이</th></tr></thead><tbody><tr><td><strong>1 SET</strong></td><td>00:08:14</td><td>00:31:42</td><td>해군본부</td><td>23:28</td></tr><tr><td><strong>2 SET</strong></td><td>00:38:06</td><td>진행중</td><td>—</td><td>18:21</td></tr></tbody></table></section>`;
    const logs = `<section class="panel"><div class="panel-head"><strong>이벤트 로그</strong><span>실시간 기록</span></div><ul class="log-list"><li><strong>듀얼 시작</strong><span>2세트 · 00:38:06</span></li><li><strong>사이드 교체 종료</strong><span>00:37:48</span></li><li><strong>승패 보고</strong><span>해군본부 · 1세트</span></li><li><strong>녹화 기준 설정</strong><span>00:00:00</span></li></ul></section>`;
    return shell('편집 로그 패널','듀얼 구간과 이벤트를 확인하고 편집 자료를 내려받습니다.',`${metrics}<div class="editor-layout">${rounds}${logs}</div>`,'프리셋 · 백업');
  }

  stage.innerHTML = screen === 'tablet' ? tablet() : screen === 'editor' ? editor() : control();
  function resize() {
    const scale = Math.min(innerWidth / 1920, innerHeight / 1080);
    stage.style.transform = `scale(${scale})`;
    stage.style.marginLeft = `${Math.max(0,(innerWidth - 1920 * scale) / 2)}px`;
  }
  addEventListener('resize', resize);
  resize();
</script>
</body>
</html>
