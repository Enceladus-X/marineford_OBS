<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Marineford Edit Assist</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;800&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0b0d13;
    --panel:#151824;
    --panel2:#1d2130;
    --gold:#c9a84c;
    --text:#f4f3ef;
    --muted:rgba(244,243,239,.62);
    --line:rgba(201,168,76,.25);
    --green:#31a872;
    --red:#d44949;
  }
  * { box-sizing:border-box; }
  body { margin:0; min-height:100vh; background:var(--bg); color:var(--text); font-family:'Noto Sans KR',sans-serif; padding:24px; }
  .shell { max-width:1180px; margin:0 auto; display:grid; gap:18px; }
  header { display:flex; justify-content:space-between; align-items:flex-end; gap:18px; border-bottom:1px solid var(--line); padding-bottom:18px; }
  h1 { margin:0; font-family:'Bebas Neue',sans-serif; color:var(--gold); letter-spacing:.08em; font-size:42px; line-height:1; }
  .sub { color:var(--muted); margin-top:6px; font-size:14px; }
  .toolbar { display:flex; flex-wrap:wrap; gap:10px; justify-content:flex-end; }
  a, button { border:1px solid var(--line); border-radius:6px; background:var(--panel2); color:var(--text); padding:10px 14px; font:inherit; font-weight:800; text-decoration:none; cursor:pointer; }
  a:hover, button:hover { border-color:var(--gold); }
  button.primary { background:var(--green); border-color:transparent; color:#fff; }
  .summary { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; }
  .metric { background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:16px; }
  .metric span { display:block; color:var(--muted); font-size:12px; margin-bottom:8px; }
  .metric strong { font-family:'Bebas Neue',sans-serif; font-size:40px; letter-spacing:.03em; line-height:1; }
  table { width:100%; border-collapse:collapse; overflow:hidden; border-radius:8px; background:var(--panel); border:1px solid var(--line); }
  th, td { padding:13px 14px; text-align:left; border-bottom:1px solid rgba(255,255,255,.06); font-size:14px; }
  th { color:var(--gold); font-size:12px; letter-spacing:.08em; text-transform:uppercase; background:rgba(0,0,0,.22); }
  tr:last-child td { border-bottom:0; }
  .muted { color:var(--muted); }
  .event-list { background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:14px; max-height:300px; overflow:auto; }
  .event { display:grid; grid-template-columns:160px 1fr auto; gap:12px; align-items:center; padding:9px 0; border-bottom:1px solid rgba(255,255,255,.06); font-size:13px; }
  .event:last-child { border-bottom:0; }
  .pill { display:inline-flex; align-items:center; justify-content:center; min-width:84px; padding:5px 8px; border-radius:999px; background:rgba(201,168,76,.15); color:var(--gold); font-weight:800; font-size:12px; }
  .empty { color:var(--muted); background:var(--panel); border:1px dashed var(--line); border-radius:8px; padding:30px; text-align:center; }
  .toast { min-height:22px; text-align:right; color:var(--muted); font-size:13px; }
  @media (max-width:820px) {
    body { padding:16px; }
    header { display:grid; align-items:start; }
    .toolbar { justify-content:start; }
    .summary { grid-template-columns:1fr 1fr; }
    .event { grid-template-columns:1fr; }
    table { display:block; overflow-x:auto; white-space:nowrap; }
  }
</style>
</head>
<body>
<main class="shell">
  <header>
    <div>
      <h1>EDIT ASSIST</h1>
      <div class="sub" id="match-title">Marineford 방송 편집 로그</div>
    </div>
    <div>
      <div class="toolbar">
        <a href="/api/export/cuts.csv">cuts.csv</a>
        <a href="/api/export/chapters.txt">chapters.txt</a>
        <a href="/api/export/ffmpeg.txt">ffmpeg.txt</a>
        <button class="primary" onclick="sendAction({action:'mark_recording_start'})">녹화 기준 찍기</button>
        <button onclick="loadAll()">새로고침</button>
      </div>
      <div class="toast" id="toast"></div>
    </div>
  </header>

  <section class="summary">
    <div class="metric"><span>상태</span><strong id="phase">-</strong></div>
    <div class="metric"><span>현재 세트</span><strong id="set-number">-</strong></div>
    <div class="metric"><span>스코어</span><strong id="score">0:0</strong></div>
    <div class="metric"><span>듀얼 구간</span><strong id="segment-count">0</strong></div>
  </section>

  <section>
    <table>
      <thead>
        <tr>
          <th>세트</th>
          <th>시작</th>
          <th>종료</th>
          <th>승자</th>
          <th>스코어</th>
          <th>길이</th>
        </tr>
      </thead>
      <tbody id="segments"></tbody>
    </table>
  </section>

  <section>
    <div class="event-list" id="events"></div>
  </section>
</main>

<script>
const phaseLabels = {
  idle: '대기',
  dueling: '듀얼',
  sideboarding: '사이드',
  finished: '종료'
};
const eventLabels = {
  recording_start: '녹화 기준',
  duel_start: '듀얼 시작',
  set_end: '세트 종료',
  match_reset: '매치 초기화',
  match_finished: '매치 종료'
};

function $(id) { return document.getElementById(id); }

function formatTime(value) {
  if (!value) return '-';
  const date = new Date(value);
  if (Number.isNaN(date.getTime())) return value;
  return date.toLocaleString('ko-KR', { hour12:false });
}

function formatDuration(seconds) {
  seconds = Math.max(0, Number(seconds) || 0);
  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  const s = seconds % 60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function setToast(message, isError = false) {
  $('toast').textContent = message || '';
  $('toast').style.color = isError ? '#ff9a9a' : 'rgba(244,243,239,.62)';
  clearTimeout($('toast')._timer);
  if (message) $('toast')._timer = setTimeout(() => { $('toast').textContent = ''; }, 2200);
}

function renderState(state) {
  $('match-title').textContent = state.tournamentName || state.roundName || 'Marineford 방송 편집 로그';
  $('phase').textContent = phaseLabels[state.phase] || '-';
  $('set-number').textContent = state.currentSet || 1;
  $('score').textContent = `${state.scoreLeft ?? 0}:${state.scoreRight ?? 0}`;
}

function renderSegments(segments) {
  $('segment-count').textContent = segments.length;
  if (!segments.length) {
    $('segments').innerHTML = '<tr><td colspan="6" class="muted">아직 완성된 듀얼 구간이 없습니다.</td></tr>';
    return;
  }
  $('segments').innerHTML = segments.map(segment => `
    <tr>
      <td>${segment.set}세트</td>
      <td>${formatTime(segment.start)}</td>
      <td>${formatTime(segment.end)}</td>
      <td>${segment.winner === 'left' ? '왼쪽' : segment.winner === 'right' ? '오른쪽' : '-'}</td>
      <td>${segment.scoreLeft}:${segment.scoreRight}</td>
      <td>${formatDuration(segment.durationSeconds)}</td>
    </tr>
  `).join('');
}

function renderEvents(events) {
  if (!events.length) {
    $('events').innerHTML = '<div class="empty">이벤트 로그가 비어 있습니다.</div>';
    return;
  }
  $('events').innerHTML = events.slice().reverse().map(event => `
    <div class="event">
      <span class="pill">${eventLabels[event.type] || event.type}</span>
      <span>${formatTime(event.time)} ${event.set ? `· ${event.set}세트` : ''}</span>
      <span class="muted">${event.scoreLeft ?? ''}${event.scoreLeft !== undefined ? ':' : ''}${event.scoreRight ?? ''}</span>
    </div>
  `).join('');
}

async function loadAll() {
  try {
    const [stateRes, eventsRes] = await Promise.all([
      fetch('/api/state?_=' + Date.now()),
      fetch('/api/events?_=' + Date.now())
    ]);
    const state = await stateRes.json();
    const payload = await eventsRes.json();
    renderState(state);
    renderSegments(payload.segments || []);
    renderEvents(payload.events || []);
  } catch (e) {
    setToast('불러오기 실패', true);
  }
}

async function sendAction(payload) {
  try {
    const res = await fetch('/api/action', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(payload)
    });
    const result = await res.json();
    if (!result.ok) throw new Error(result.error || 'action failed');
    setToast('반영됨');
    await loadAll();
  } catch (e) {
    setToast('처리 실패', true);
  }
}

loadAll();
setInterval(loadAll, 1500);
</script>
</body>
</html>
