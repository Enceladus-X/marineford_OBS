<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Marineford Edit Assist</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;800&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#050506;
    --bg-deep:#020203;
    --panel:rgba(255,255,255,.048);
    --panel2:#0f1014;
    --accent:#5e6ad2;
    --accent2:#7883e8;
    --text:#ededf0;
    --muted:#8a8f98;
    --line:rgba(255,255,255,.075);
    --line-hover:rgba(255,255,255,.14);
    --green:#35a875;
    --red:#d34f59;
  }
  * { box-sizing:border-box; }
  body { margin:0; min-height:100vh; background:radial-gradient(ellipse at 50% -10%,rgba(94,106,210,.13),transparent 42%),linear-gradient(180deg,#08080b 0%,var(--bg) 48%,var(--bg-deep) 100%); color:var(--text); font-family:'Noto Sans KR',sans-serif; padding:16px; }
  body::before { content:""; position:fixed; inset:0; pointer-events:none; opacity:.018; background-image:linear-gradient(rgba(255,255,255,.7) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.7) 1px,transparent 1px); background-size:64px 64px; }
  .shell { position:relative; max-width:1480px; margin:0 auto; display:grid; gap:12px; }
  header { display:flex; justify-content:space-between; align-items:center; gap:18px; border-bottom:1px solid var(--line); padding:2px 2px 12px; }
  h1 { margin:0; color:var(--text); font-size:27px; font-weight:800; letter-spacing:0; line-height:1; }
  .sub { color:var(--muted); margin-top:6px; font-size:12px; font-weight:700; }
  .toolbar { display:flex; flex-wrap:wrap; gap:7px; justify-content:flex-end; }
  a, button { min-height:36px; border:1px solid var(--line); border-radius:7px; background:rgba(255,255,255,.045); color:var(--muted); padding:0 12px; font:inherit; font-size:12px; font-weight:800; text-decoration:none; cursor:pointer; display:inline-flex; align-items:center; justify-content:center; transition:background .2s,border-color .2s,color .2s,transform .2s; }
  a:hover, button:hover { border-color:var(--line-hover); background:rgba(255,255,255,.075); color:var(--text); transform:translateY(-1px); }
  a:focus-visible, button:focus-visible { outline:2px solid var(--accent2); outline-offset:2px; }
  button.primary { background:var(--accent); border-color:rgba(120,131,232,.7); color:#fff; box-shadow:0 6px 20px rgba(94,106,210,.25); }
  .summary { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
  .metric { background:linear-gradient(180deg,rgba(255,255,255,.062),rgba(255,255,255,.026)); border:1px solid var(--line); border-radius:8px; padding:13px; box-shadow:0 10px 28px rgba(0,0,0,.2); }
  .metric span { display:block; color:var(--muted); font-size:11px; font-weight:800; margin-bottom:7px; }
  .metric strong { font-family:'Bebas Neue',sans-serif; font-size:42px; letter-spacing:0; line-height:1; }
  table { width:100%; border-collapse:collapse; overflow:hidden; border-radius:8px; background:var(--panel); border:1px solid var(--line); box-shadow:0 10px 28px rgba(0,0,0,.2); }
  th, td { padding:11px 13px; text-align:left; border-bottom:1px solid rgba(255,255,255,.055); font-size:13px; }
  th { color:#b9bff5; font-size:11px; font-weight:800; background:rgba(0,0,0,.25); }
  tr:last-child td { border-bottom:0; }
  tbody tr:hover { background:rgba(94,106,210,.07); }
  .muted { color:var(--muted); }
  .event-list { background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:10px 13px; max-height:360px; overflow:auto; box-shadow:0 10px 28px rgba(0,0,0,.2); }
  .event { display:grid; grid-template-columns:150px 1fr auto; gap:12px; align-items:center; padding:8px 0; border-bottom:1px solid rgba(255,255,255,.055); font-size:12px; }
  .event:last-child { border-bottom:0; }
  .pill { display:inline-flex; align-items:center; justify-content:center; min-width:84px; padding:5px 8px; border-radius:6px; background:rgba(94,106,210,.14); border:1px solid rgba(120,131,232,.22); color:#c8cdf8; font-weight:800; font-size:11px; }
  .empty { color:var(--muted); background:var(--panel); border:1px dashed var(--line); border-radius:8px; padding:30px; text-align:center; }
  .toast { min-height:18px; text-align:right; color:var(--muted); font-size:12px; }
  @media (max-width:820px) {
    body { padding:12px; }
    header { display:grid; align-items:start; }
    .toolbar { justify-content:start; }
    .summary { grid-template-columns:1fr 1fr; }
    .event { grid-template-columns:1fr; }
    table { display:block; overflow-x:auto; white-space:nowrap; }
  }
</style>
</head>
<body>
<main class="shell">
  <header>
    <div>
      <h1>EDIT ASSIST</h1>
      <div class="sub" id="match-title">Marineford 방송 편집 로그</div>
    </div>
    <div>
      <div class="toolbar">
        <a href="/control.html">컨트롤</a>
        <a href="/overlay.html" target="_blank" rel="noopener">송출 화면</a>
        <a href="/tablet.html" target="_blank" rel="noopener">태블릿</a>
        <a href="/api/export/cuts.csv">cuts.csv</a>
        <a href="/api/export/chapters.txt">chapters.txt</a>
        <a href="/api/export/ffmpeg.txt">ffmpeg.txt</a>
        <button class="primary" onclick="sendAction({action:'mark_recording_start'})">녹화 기준 찍기</button>
        <button onclick="loadAll()">새로고침</button>
      </div>
      <div class="toast" id="toast"></div>
    </div>
  </header>

  <section class="summary">
    <div class="metric"><span>상태</span><strong id="phase">-</strong></div>
    <div class="metric"><span>현재 세트</span><strong id="set-number">-</strong></div>
    <div class="metric"><span>스코어</span><strong id="score">0:0</strong></div>
    <div class="metric"><span>듀얼 구간</span><strong id="segment-count">0</strong></div>
  </section>

  <section>
    <table>
      <thead>
        <tr>
          <th>세트</th>
          <th>시작</th>
          <th>종료</th>
          <th>승자</th>
          <th>스코어</th>
          <th>길이</th>
        </tr>
      </thead>
      <tbody id="segments"></tbody>
    </table>
  </section>

  <section>
    <div class="event-list" id="events"></div>
  </section>
</main>

<script>
const phaseLabels = {
  idle: '대기',
  round_waiting: '라운드 대기',
  dueling: '듀얼',
  sideboarding: '사이드',
  finished: '종료',
  judge_call: '저지 호출'
};
const eventLabels = {
  recording_start: '녹화 기준',
  duel_start: '듀얼 시작',
  set_end: '세트 종료',
  match_reset: '매치 초기화',
  next_round_prepare: '다음 라운드 준비',
  match_finished: '매치 종료',
  judge_call_start: '저지 호출 시작',
  judge_call_end: '저지 호출 종료',
  score_adjust: '수동 점수 조절',
  timer_start: '타이머 시작',
  timer_pause: '타이머 일시정지',
  timer_reset: '타이머 초기화'
};

function $(id) { return document.getElementById(id); }

function formatTime(value) {
  if (!value) return '-';
  const date = new Date(value);
  if (Number.isNaN(date.getTime())) return value;
  return date.toLocaleString('ko-KR', { hour12:false });
}

function formatDuration(seconds) {
  seconds = Math.max(0, Number(seconds) || 0);
  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  const s = seconds % 60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function setToast(message, isError = false) {
  $('toast').textContent = message || '';
  $('toast').style.color = isError ? '#ff9a9a' : 'rgba(244,243,239,.62)';
  clearTimeout($('toast')._timer);
  if (message) $('toast')._timer = setTimeout(() => { $('toast').textContent = ''; }, 2200);
}

function renderState(state) {
  $('match-title').textContent = state.tournamentName || state.roundName || 'Marineford 방송 편집 로그';
  $('phase').textContent = phaseLabels[state.phase] || '-';
  $('set-number').textContent = state.currentSet || 1;
  $('score').textContent = `${state.scoreLeft ?? 0}:${state.scoreRight ?? 0}`;
}

function renderSegments(segments) {
  $('segment-count').textContent = segments.length;
  if (!segments.length) {
    $('segments').innerHTML = '<tr><td colspan="6" class="muted">아직 완성된 듀얼 구간이 없습니다.</td></tr>';
    return;
  }
  $('segments').innerHTML = segments.map(segment => `
    <tr>
      <td>${segment.set}세트</td>
      <td>${formatTime(segment.start)}</td>
      <td>${formatTime(segment.end)}</td>
      <td>${segment.winner === 'left' ? '왼쪽' : segment.winner === 'right' ? '오른쪽' : '-'}</td>
      <td>${segment.scoreLeft}:${segment.scoreRight}</td>
      <td>${formatDuration(segment.durationSeconds)}</td>
    </tr>
  `).join('');
}

function renderEvents(events) {
  if (!events.length) {
    $('events').innerHTML = '<div class="empty">이벤트 로그가 비어 있습니다.</div>';
    return;
  }
  $('events').innerHTML = events.slice().reverse().map(event => `
    <div class="event">
      <span class="pill">${eventLabels[event.type] || event.type}</span>
      <span>${formatTime(event.time)} ${event.set ? `· ${event.set}세트` : ''}</span>
      <span class="muted">${event.scoreLeft ?? ''}${event.scoreLeft !== undefined ? ':' : ''}${event.scoreRight ?? ''}</span>
    </div>
  `).join('');
}

async function loadAll() {
  try {
    const [stateRes, eventsRes] = await Promise.all([
      fetch('/api/state?_=' + Date.now()),
      fetch('/api/events?_=' + Date.now())
    ]);
    const state = await stateRes.json();
    const payload = await eventsRes.json();
    renderState(state);
    renderSegments(payload.segments || []);
    renderEvents(payload.events || []);
  } catch (e) {
    setToast('불러오기 실패', true);
  }
}

async function sendAction(payload) {
  try {
    const res = await fetch('/api/action', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(payload)
    });
    const result = await res.json();
    if (!result.ok) throw new Error(result.error || 'action failed');
    setToast('반영됨');
    await loadAll();
  } catch (e) {
    setToast('처리 실패', true);
  }
}

loadAll();
setInterval(loadAll, 1500);
</script>
</body>
</html>
