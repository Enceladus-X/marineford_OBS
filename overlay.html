<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Marineford OBS Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root { --gold:#c9a84c; --gold2:#efd36d; --text:#f7f4ea; --muted:rgba(247,244,234,.62); }
  * { box-sizing:border-box; }
  body { margin:0; width:100vw; height:100vh; overflow:hidden; background:transparent; color:var(--text); font-family:'Noto Sans KR',sans-serif; }
  .overlay { position:relative; width:1920px; height:1080px; transform-origin:top left; background:transparent; }
  .top { position:absolute; left:50px; right:50px; top:18px; display:grid; grid-template-columns:minmax(0,1fr) 560px minmax(0,1fr); gap:32px; align-items:start; z-index:6; }
  .player { min-width:0; padding-top:8px; }
  .player.right { text-align:right; }
  .name { min-width:0; font-size:58px; font-weight:900; line-height:1; text-shadow:0 4px 14px rgba(0,0,0,.9); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .scoreline { color:var(--gold); font-family:'Bebas Neue',sans-serif; font-size:24px; letter-spacing:.12em; margin-top:8px; text-shadow:0 3px 10px rgba(0,0,0,.85); }
  .center { display:grid; justify-items:center; gap:6px; min-width:560px; }
  #timer-display { font-family:'Bebas Neue',sans-serif; color:var(--gold2); font-size:78px; line-height:.86; letter-spacing:0; text-shadow:0 4px 12px rgba(0,0,0,.85); }
  #timer-display.warning { color:#ffbc73; }
  #timer-display.danger { color:#ff7078; animation:pulse .8s infinite; }
  #phase-display { color:var(--muted); font-size:30px; font-weight:900; text-shadow:0 2px 8px rgba(0,0,0,.8); }
  #tournament-name { color:var(--gold); font-size:26px; font-weight:900; text-shadow:0 2px 8px rgba(0,0,0,.85); }
  .score { position:absolute; left:50%; top:132px; transform:translateX(-50%); display:flex; gap:18px; align-items:center; font-family:'Bebas Neue',sans-serif; font-size:96px; line-height:.8; text-shadow:0 5px 16px rgba(0,0,0,.9); z-index:5; }
  .score .sep { color:var(--gold); }
  .image-side { position:absolute; top:250px; bottom:42px; width:330px; display:grid; grid-template-rows:1fr 1fr; gap:18px; z-index:3; }
  .image-side.left { left:42px; }
  .image-side.right { right:42px; }
  .image-slot { border:2px solid rgba(201,168,76,.38); border-radius:10px; background:rgba(8,9,14,.62); overflow:hidden; display:grid; place-items:center; }
  .image-slot.single { grid-row:1/-1; }
  .image-slot.hidden { display:none; }
  .image-slot img { width:100%; height:100%; object-fit:cover; }
  #phase-banner { position:absolute; left:0; right:0; top:50%; transform:translateY(-50%); min-height:190px; display:none; align-items:center; justify-content:center; flex-direction:column; gap:14px; background:rgba(0,0,0,.78); border-top:2px solid rgba(201,168,76,.58); border-bottom:2px solid rgba(201,168,76,.58); z-index:20; text-align:center; backdrop-filter:blur(2px); }
  #phase-banner.show { display:flex; }
  #phase-banner.full { inset:0; top:0; transform:none; min-height:auto; background:rgba(0,0,0,.92); border:0; }
  .banner-main { font-size:92px; font-weight:900; letter-spacing:.02em; text-shadow:0 8px 22px rgba(0,0,0,.9); }
  .banner-sub { color:var(--gold2); font-family:'Bebas Neue',sans-serif; font-size:42px; letter-spacing:.12em; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
</style>
</head>
<body>
<div class="overlay" id="overlay">
  <div class="top">
    <div class="player">
      <div class="name" id="p1-name"></div>
      <div class="scoreline">PLAYER 1</div>
    </div>
    <div class="center">
      <div id="timer-display">40:00</div>
      <div id="phase-display">대기중 · 1세트</div>
      <div id="tournament-name"></div>
    </div>
    <div class="player right">
      <div class="name" id="p2-name"></div>
      <div class="scoreline">PLAYER 2</div>
    </div>
  </div>

  <div class="score"><span id="score-left">0</span><span class="sep">:</span><span id="score-right">0</span></div>

  <div class="image-side left">
    <div class="image-slot single hidden" id="left-img-1-single"><img id="left-img-1" alt=""></div>
    <div class="image-slot hidden" id="left-img-1-top"><img id="left-img-1b" alt=""></div>
    <div class="image-slot hidden" id="left-img-2"><img id="left-img-2-el" alt=""></div>
  </div>
  <div class="image-side right">
    <div class="image-slot single hidden" id="right-img-1-single"><img id="right-img-1" alt=""></div>
    <div class="image-slot hidden" id="right-img-1-top"><img id="right-img-1b" alt=""></div>
    <div class="image-slot hidden" id="right-img-2"><img id="right-img-2-el" alt=""></div>
  </div>

  <div id="phase-banner">
    <div class="banner-main" id="phase-banner-main">사이드 교체중</div>
    <div class="banner-sub" id="phase-banner-sub">NEXT SET READY</div>
  </div>
</div>

<script>
let remainingSeconds = 2400;
let timerRunning = false;
let timerInterval = null;
let lastState = null;
window.lastOverlayState = null;

function scaleOverlay() {
  const scale = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
  document.getElementById('overlay').style.transform = `scale(${scale})`;
}
window.addEventListener('resize', scaleOverlay);
scaleOverlay();

function applyState(s) {
  if (!s) return;
  document.getElementById('p1-name').textContent = s.p1Name || '';
  document.getElementById('p2-name').textContent = s.p2Name || '';
  document.getElementById('tournament-name').textContent = s.tournamentName || '';
  document.getElementById('score-left').textContent = s.scoreLeft ?? 0;
  document.getElementById('score-right').textContent = s.scoreRight ?? 0;
  if (s.timerSeconds !== undefined) {
    remainingSeconds = s.timerSeconds;
    updateTimerDisplay();
  }
  if (s.timerRunning !== undefined) {
    if (s.timerRunning && !timerRunning) startTimer();
    else if (!s.timerRunning && timerRunning) stopTimer();
  }
  applyPhase(s);
  applyImages(s);
}

function applyPhase(s) {
  const phase = s.phase || 'idle';
  const labels = {
    idle: '대기중',
    round_waiting: '다음 라운드 대기중',
    dueling: '듀얼중',
    sideboarding: '사이드덱 교체중',
    finished: '매치 종료',
    judge_call: '저지 호출 중'
  };
  const setNumber = s.currentSet || 1;
  document.getElementById('phase-display').textContent = `${labels[phase] || labels.idle} · ${setNumber}세트`;
  const banner = document.getElementById('phase-banner');
  const main = document.getElementById('phase-banner-main');
  const sub = document.getElementById('phase-banner-sub');
  const showBanner = ['sideboarding', 'finished', 'round_waiting', 'judge_call'].includes(phase);
  banner.classList.toggle('show', showBanner);
  banner.classList.toggle('full', phase === 'finished' || phase === 'round_waiting');
  if (phase === 'finished') {
    main.textContent = '매치 종료';
    sub.textContent = `${s.scoreLeft ?? 0} : ${s.scoreRight ?? 0}`;
  } else if (phase === 'round_waiting') {
    main.textContent = '다음 라운드 대기중';
    sub.textContent = 'WAITING FOR NEXT ROUND';
  } else if (phase === 'judge_call') {
    main.textContent = '저지 호출 중';
    sub.textContent = 'JUDGE CALL';
  } else {
    main.textContent = '사이드 교체중';
    sub.textContent = 'NEXT SET READY';
  }
}

function applyImages(s) {
  const l1 = s.leftImg1 || '', l2 = s.leftImg2 || '';
  const r1 = s.rightImg1 || '', r2 = s.rightImg2 || '';
  document.getElementById('left-img-1-single').classList.toggle('hidden', !(l1 && !l2));
  document.getElementById('left-img-1').src = l1;
  document.getElementById('left-img-1-top').classList.toggle('hidden', !(l1 && l2));
  document.getElementById('left-img-1b').src = l1;
  document.getElementById('left-img-2').classList.toggle('hidden', !l2);
  document.getElementById('left-img-2-el').src = l2;
  document.getElementById('right-img-1-single').classList.toggle('hidden', !(r1 && !r2));
  document.getElementById('right-img-1').src = r1;
  document.getElementById('right-img-1-top').classList.toggle('hidden', !(r1 && r2));
  document.getElementById('right-img-1b').src = r1;
  document.getElementById('right-img-2').classList.toggle('hidden', !r2);
  document.getElementById('right-img-2-el').src = r2;
}

function updateTimerDisplay() {
  const extraTurnSeconds = window.lastOverlayState?.extraTurnSeconds || 0;
  const value = Math.floor(remainingSeconds || 0);
  let text;
  if (value < 0 && extraTurnSeconds > 0) {
    const extraRemaining = extraTurnSeconds + value;
    const absExtra = Math.abs(extraRemaining);
    text = 'EX ' + (extraRemaining < 0 ? '-' : '') + String(Math.floor(absExtra / 60)).padStart(2,'0') + ':' + String(absExtra % 60).padStart(2,'0');
  } else {
    const abs = Math.abs(value);
    text = (value < 0 ? '-' : '') + String(Math.floor(abs / 60)).padStart(2,'0') + ':' + String(abs % 60).padStart(2,'0');
  }
  document.getElementById('timer-display').textContent = text;
  const el = document.getElementById('timer-display');
  el.classList.toggle('danger', remainingSeconds <= 0);
  el.classList.toggle('warning', remainingSeconds > 0 && remainingSeconds <= 180);
}

function startTimer() {
  if (timerRunning) return;
  timerRunning = true;
  timerInterval = setInterval(() => { remainingSeconds--; updateTimerDisplay(); }, 1000);
}
function stopTimer() { timerRunning = false; clearInterval(timerInterval); }

async function poll() {
  try {
    const res = await fetch('/api/state?_=' + Date.now());
    const s = await res.json();
    window.lastOverlayState = s;
    const str = JSON.stringify(s);
    if (str !== lastState) { lastState = str; applyState(s); }
  } catch (e) {}
}
poll();
setInterval(poll, 500);
</script>
</body>
</html>
