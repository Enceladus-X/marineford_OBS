<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Marineford Tablet Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@500;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root { --bg:#07080d; --panel:#111521; --panel2:#1b2130; --line:rgba(201,168,76,.26); --gold:#c9a84c; --gold2:#efd36d; --text:#f7f5ee; --muted:rgba(247,245,238,.62); --red:#c93f46; --blue:#326bd4; --green:#2f9d69; --orange:#c96f2d; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { margin:0; min-height:100%; background:var(--bg); color:var(--text); font-family:'Noto Sans KR',sans-serif; }
  body { padding:8px; overflow:auto; overscroll-behavior:none; }
  .shell { width:min(1180px,100%); min-height:calc(100dvh - 16px); margin:0 auto; display:grid; grid-template-rows:auto 1fr auto; gap:8px; }
  .topbar { display:grid; grid-template-columns:1fr auto; align-items:center; gap:10px; min-height:40px; }
  .brand { min-width:0; display:flex; gap:12px; align-items:baseline; overflow:hidden; }
  .brand strong { font-family:'Bebas Neue',sans-serif; color:var(--gold2); font-size:30px; line-height:1; letter-spacing:.06em; }
  .brand span { color:var(--text); font-size:18px; font-weight:900; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .top-actions { display:flex; gap:8px; align-items:center; }
  .chip { min-height:34px; border:1px solid var(--line); border-radius:999px; padding:6px 11px; color:var(--muted); font-size:15px; font-weight:900; white-space:nowrap; }
  .chip.dueling { color:#8be0af; border-color:rgba(47,157,105,.5); }
  .chip.sideboarding { color:#ffbc73; border-color:rgba(201,111,45,.5); }
  .chip.finished, .chip.judge_call { color:#ff9299; border-color:rgba(201,63,70,.55); }
  button { min-height:42px; border:0; border-radius:7px; color:#fff; font-family:'Noto Sans KR',sans-serif; font-size:15px; font-weight:900; cursor:pointer; box-shadow:inset 0 -2px 0 rgba(0,0,0,.22); white-space:nowrap; }
  button:active { transform:translateY(1px); }
  button:disabled { opacity:.42; cursor:not-allowed; transform:none; }
  .ghost { background:var(--panel2); border:1px solid var(--line); color:var(--muted); box-shadow:none; }
  .blue { background:var(--blue); }
  .red { background:var(--red); }
  .green { background:var(--green); }
  .orange { background:var(--orange); }
  .gold { background:var(--gold); color:#171100; }
  .judge { min-width:126px; background:var(--red); font-size:17px; }
  .judge.active { background:#f04c55; animation:pulse .8s infinite; }
  .advanced { min-width:76px; }
  .setup-view { min-height:0; display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .setup-card { border:1px solid var(--line); border-radius:8px; background:linear-gradient(180deg,#151a27,#0c0f16); display:grid; place-items:center; align-content:center; gap:14px; padding:20px; text-align:center; }
  .setup-side { font-family:'Bebas Neue',sans-serif; color:var(--gold); font-size:clamp(36px,7vw,76px); line-height:.9; }
  .setup-name { max-width:100%; font-size:clamp(24px,4.6vw,48px); font-weight:900; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .setup-hint { color:#ffbc73; font-size:clamp(14px,1.8vw,20px); font-weight:900; }
  .score-view { min-height:0; display:grid; grid-template-columns:minmax(0,1fr) auto minmax(0,1fr); grid-template-rows:auto auto auto; align-content:center; align-items:start; column-gap:18px; row-gap:16px; padding:20px 6px; }
  .score-timer { grid-column:1/-1; color:var(--gold2); font-family:'Bebas Neue',sans-serif; font-size:clamp(46px,7.2vw,82px); line-height:.8; text-align:center; letter-spacing:0; margin-bottom:clamp(34px,7vh,82px); }
  .player-name { min-width:0; min-height:52px; margin-top:-10px; margin-bottom:8px; color:var(--text); font-size:clamp(28px,3.6vw,48px); line-height:1.1; font-weight:900; text-align:center; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; text-shadow:0 3px 10px rgba(0,0,0,.75); }
  .player-name.left { grid-column:1; grid-row:2; }
  .player-name.right { grid-column:3; grid-row:2; }
  .score { grid-row:3; font-family:'Bebas Neue',sans-serif; font-size:clamp(120px,24vw,280px); line-height:.72; text-align:center; letter-spacing:0; }
  .score.left { grid-column:1; }
  .score.right { grid-column:3; }
  .colon { grid-column:2; grid-row:3; align-self:center; font-family:'Bebas Neue',sans-serif; color:var(--gold); font-size:clamp(76px,13vw,150px); line-height:.7; }
  .dock { background:rgba(17,21,33,.97); border:1px solid var(--line); border-radius:8px; padding:10px; display:grid; gap:8px; }
  .dock-main { width:100%; min-height:64px; font-size:26px; }
  #prestart-start { min-height:86px; font-size:34px; }
  .toast { min-height:16px; color:var(--muted); text-align:center; font-size:12px; font-weight:800; }
  .modal-backdrop { position:fixed; inset:0; display:none; align-items:flex-start; justify-content:center; padding:10px; background:rgba(0,0,0,.72); z-index:30; overflow:auto; }
  .modal-backdrop.open { display:flex; }
  .modal { width:min(620px,100%); max-height:calc(100dvh - 20px); overflow:auto; background:#121622; border:1px solid var(--line); border-radius:10px; padding:16px; display:grid; gap:12px; box-shadow:0 20px 60px rgba(0,0,0,.5); }
  .modal.wide { width:min(820px,100%); }
  .modal-title { display:flex; justify-content:space-between; align-items:center; gap:12px; }
  .modal-title strong { font-size:22px; }
  .field { display:grid; gap:6px; }
  .field label { color:var(--muted); font-size:12px; font-weight:900; }
  .field input { width:100%; height:42px; border:1px solid var(--line); border-radius:7px; background:var(--panel2); color:var(--text); padding:0 12px; font:inherit; font-size:15px; font-weight:900; outline:none; }
  .field input:focus { border-color:var(--gold); }
  .field-help { color:var(--gold2); font-size:12px; font-weight:900; }
  .preset-chips { display:flex; flex-wrap:wrap; gap:7px; }
  .preset-chips button { min-height:34px; padding:0 10px; background:rgba(201,168,76,.16); border:1px solid var(--line); color:var(--gold2); box-shadow:none; }
  .modal-actions, .two-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .three-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; }
  .winner-button { min-height:92px; font-size:clamp(22px,3vw,34px); white-space:normal; line-height:1.15; padding:10px; }
  .score-adjust { display:grid; gap:10px; }
  .score-row { display:grid; grid-template-columns:minmax(0,1fr) 54px 78px 54px; gap:8px; align-items:center; }
  .score-row strong { min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; text-align:left; font-size:18px; }
  .score-row .num { font-family:'Bebas Neue',sans-serif; font-size:48px; line-height:.9; text-align:center; }
  .score-row button { min-height:54px; font-size:26px; }
  .hidden { display:none !important; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.55} }
  @media (max-width:760px) {
    .brand span { display:none; }
    .setup-view { min-height:50dvh; }
    .score { font-size:clamp(105px,23vw,220px); }
    .judge { min-width:108px; font-size:15px; }
  }
  @media (max-width:560px) {
    .setup-view, .modal-actions, .two-grid, .three-grid { grid-template-columns:1fr; }
    .topbar { grid-template-columns:1fr; }
    .top-actions { justify-content:space-between; }
  }
</style>
</head>
<body>
<main class="shell">
  <header class="topbar">
    <div class="brand">
      <strong>MARINEFORD</strong>
      <span id="match-title">방송 테이블</span>
    </div>
    <div class="top-actions">
      <div class="chip" id="phase">대기중</div>
      <button class="judge" id="judge-button" onclick="toggleJudgeCall()">저지 호출</button>
      <button class="ghost advanced" onclick="openAdvancedModal()">고급</button>
    </div>
  </header>

  <section class="setup-view" id="setup-view">
    <button class="setup-card" type="button" onclick="openPlayerModal('left')">
      <div class="setup-side">LEFT</div>
      <div class="setup-name" id="left-setup-name">터치해서 설정</div>
      <div class="setup-hint" id="left-setup-hint">닉네임과 덱 이름 입력</div>
    </button>
    <button class="setup-card" type="button" onclick="openPlayerModal('right')">
      <div class="setup-side">RIGHT</div>
      <div class="setup-name" id="right-setup-name">터치해서 설정</div>
      <div class="setup-hint" id="right-setup-hint">닉네임과 덱 이름 입력</div>
    </button>
  </section>

  <section class="score-view hidden" id="score-view">
    <div class="score-timer" id="score-timer">40:00</div>
    <div class="player-name left" id="left-name">왼쪽</div>
    <div class="player-name right" id="right-name">오른쪽</div>
    <div class="score left" id="left-score">0</div>
    <div class="colon">:</div>
    <div class="score right" id="right-score">0</div>
  </section>

  <footer class="dock">
    <div id="prestart-footer">
      <button class="green dock-main" id="prestart-start" onclick="sendAction({action:'start_duel'})">듀얼 시작</button>
    </div>
    <button class="gold dock-main hidden" id="report-open" onclick="openReportModal()">승패 보고</button>
    <button class="green dock-main hidden" id="next-open" onclick="sendAction({action:'start_duel'})">다음 듀얼 시작</button>
    <button class="orange dock-main hidden" id="prepare-open" onclick="sendAction({action:'prepare_next_round'})">다음 라운드 준비</button>
    <div class="toast" id="toast"></div>
  </footer>
</main>

<div class="modal-backdrop" id="player-modal">
  <div class="modal">
    <div class="modal-title"><strong id="modal-title">플레이어 설정</strong></div>
    <div class="field">
      <label for="modal-name">닉네임</label>
      <input id="modal-name" type="text" autocomplete="name" placeholder="방송에 표시할 이름">
    </div>
    <div class="field">
      <label for="modal-deck">덱 이름</label>
      <input id="modal-deck" type="text" list="deck-preset-list" autocomplete="off" placeholder="덱 이름 입력">
      <div class="field-help">입력해도 상대에게는 보이지 않습니다.</div>
      <div class="preset-chips" id="deck-preset-chips"></div>
    </div>
    <div class="modal-actions">
      <button class="ghost" onclick="closePlayerModal()">취소</button>
      <button class="green" onclick="savePlayerSetup()">저장</button>
    </div>
  </div>
</div>

<div class="modal-backdrop" id="report-modal">
  <div class="modal wide">
    <div class="modal-title"><strong>승패 보고</strong></div>
    <div class="two-grid">
      <button class="blue winner-button" id="report-left-win" onclick="reportWinner('left')">왼쪽 승</button>
      <button class="red winner-button" id="report-right-win" onclick="reportWinner('right')">오른쪽 승</button>
    </div>
    <div class="modal-actions">
      <button class="ghost" onclick="closeReportModal()">취소</button>
      <button class="orange" onclick="sendAction({action:'finish_match'}); closeReportModal();">매치 종료</button>
    </div>
  </div>
</div>

<div class="modal-backdrop" id="advanced-modal">
  <div class="modal wide">
    <div class="modal-title"><strong>고급</strong></div>
    <div class="three-grid">
      <button class="ghost" onclick="requestFullscreenMode()">전체화면</button>
      <button class="ghost" onclick="sendAction({action:'undo'})">마지막 보고 취소</button>
      <button class="ghost" onclick="loadState()">새로고침</button>
    </div>
    <div class="two-grid">
      <button class="ghost" id="adv-left-edit" onclick="openPlayerModal('left')">왼쪽 플레이어 정보 수정</button>
      <button class="ghost" id="adv-right-edit" onclick="openPlayerModal('right')">오른쪽 플레이어 정보 수정</button>
    </div>
    <div class="score-adjust">
      <div class="score-row">
        <strong id="manual-left-name">왼쪽</strong>
        <button class="ghost" onclick="adjustManualScore('left', -1)">-</button>
        <div class="num" id="manual-left-score">0</div>
        <button class="ghost" onclick="adjustManualScore('left', 1)">+</button>
      </div>
      <div class="score-row">
        <strong id="manual-right-name">오른쪽</strong>
        <button class="ghost" onclick="adjustManualScore('right', -1)">-</button>
        <div class="num" id="manual-right-score">0</div>
        <button class="ghost" onclick="adjustManualScore('right', 1)">+</button>
      </div>
      <button class="blue" onclick="applyManualScore()">수동 점수 반영</button>
    </div>
    <div class="modal-actions">
      <button class="ghost" onclick="closeAdvancedModal()">닫기</button>
      <button class="red" onclick="sendAction({action:'finish_match'}); closeAdvancedModal();">매치 강제 종료</button>
    </div>
  </div>
</div>

<datalist id="deck-preset-list"></datalist>

<script>
let state = null;
let busy = false;
let modalSide = null;
let deckPresets = [];
let timerBaseSeconds = 2400;
let timerBaseAt = Date.now();
let manualScoreLeft = 0;
let manualScoreRight = 0;

const phaseLabels = {
  idle: '대기중',
  round_waiting: '다음 라운드 대기중',
  dueling: '듀얼중',
  sideboarding: '사이드덱 교체중',
  finished: '매치 종료',
  judge_call: '저지 호출 중'
};

function $(id) { return document.getElementById(id); }
function setToast(message, isError = false) {
  const el = $('toast');
  el.textContent = message || '';
  el.style.color = isError ? '#ff9a9a' : 'rgba(247,245,238,.62)';
  clearTimeout(el._timer);
  if (message) el._timer = setTimeout(() => { el.textContent = ''; }, 1800);
}
function isPrestart(s) {
  return ['idle', 'round_waiting'].includes(s.phase || 'idle') && (s.scoreLeft ?? 0) === 0 && (s.scoreRight ?? 0) === 0;
}
function formatTimer(seconds) {
  const value = Math.floor(seconds || 0);
  if (value < 0 && state?.extraTurnSeconds > 0) {
    const extraRemaining = Math.floor(state.extraTurnSeconds + value);
    const sign = extraRemaining < 0 ? '-' : '';
    const total = Math.abs(extraRemaining);
    return `EX ${sign}${String(Math.floor(total / 60)).padStart(2, '0')}:${String(total % 60).padStart(2, '0')}`;
  }
  const sign = value < 0 ? '-' : '';
  const total = Math.abs(value);
  return `${sign}${String(Math.floor(total / 60)).padStart(2, '0')}:${String(total % 60).padStart(2, '0')}`;
}
function parseStateTime(value) {
  const timestamp = Date.parse(value || '');
  return Number.isFinite(timestamp) ? timestamp : Date.now();
}
function updateTimerDisplay() {
  const running = state?.timerRunning;
  const elapsed = running ? Math.floor((Date.now() - timerBaseAt) / 1000) : 0;
  $('score-timer').textContent = formatTimer(timerBaseSeconds - elapsed);
}
function render(s) {
  state = s;
  const phase = s.phase || 'idle';
  const prestart = isPrestart(s);
  timerBaseSeconds = s.timerSeconds ?? s.mainTimerSeconds ?? 2400;
  timerBaseAt = s.timerRunning ? parseStateTime(s.updatedAt || s.duelStartedAt) : Date.now();
  updateTimerDisplay();
  $('match-title').textContent = s.tournamentName || '방송 테이블';
  $('phase').textContent = prestart ? '경기 전 설정' : `${phaseLabels[phase] || phaseLabels.idle} · ${s.currentSet || 1}세트`;
  $('phase').className = 'chip ' + phase;
  $('judge-button').textContent = phase === 'judge_call' ? '저지 복귀' : '저지 호출';
  $('judge-button').classList.toggle('active', phase === 'judge_call');
  $('setup-view').classList.toggle('hidden', !prestart);
  $('score-view').classList.toggle('hidden', prestart);
  $('prestart-footer').classList.toggle('hidden', !prestart);
  renderSetupCard('left', s.p1Name, s.p1Deck);
  renderSetupCard('right', s.p2Name, s.p2Deck);
  const leftName = s.p1Name || '왼쪽';
  const rightName = s.p2Name || '오른쪽';
  $('left-name').textContent = leftName;
  $('right-name').textContent = rightName;
  $('left-score').textContent = s.scoreLeft ?? 0;
  $('right-score').textContent = s.scoreRight ?? 0;
  const isDueling = phase === 'dueling';
  const isSideboarding = phase === 'sideboarding';
  const isFinished = phase === 'finished';
  $('prestart-start').disabled = busy || !s.p1Name || !s.p1Deck || !s.p2Name || !s.p2Deck;
  $('report-open').classList.toggle('hidden', !isDueling);
  $('next-open').classList.toggle('hidden', !isSideboarding);
  $('prepare-open').classList.toggle('hidden', !isFinished);
  $('report-left-win').textContent = `${leftName} 승`;
  $('report-right-win').textContent = `${rightName} 승`;
  $('adv-left-edit').textContent = '왼쪽 플레이어 정보 수정';
  $('adv-right-edit').textContent = '오른쪽 플레이어 정보 수정';
  $('manual-left-name').textContent = leftName;
  $('manual-right-name').textContent = rightName;
  manualScoreLeft = s.scoreLeft ?? 0;
  manualScoreRight = s.scoreRight ?? 0;
  renderManualScore();
}
function renderSetupCard(side, name, deck) {
  $(`${side}-setup-name`).textContent = name || '터치해서 설정';
  const hint = $(`${side}-setup-hint`);
  if (name && deck) {
    hint.textContent = '설정 완료 · 터치해서 수정';
    hint.style.color = '#8be0af';
  } else {
    hint.textContent = name ? '덱 이름 입력 필요' : '닉네임과 덱 이름 입력';
    hint.style.color = '#ffbc73';
  }
}
function openPlayerModal(side) {
  closeReportModal();
  closeAdvancedModal();
  loadDeckPresets();
  modalSide = side;
  const isLeft = side === 'left';
  const name = isLeft ? state?.p1Name : state?.p2Name;
  $('modal-title').textContent = name ? `${name} 정보 수정` : (isLeft ? '왼쪽 플레이어 설정' : '오른쪽 플레이어 설정');
  $('modal-name').value = isLeft ? (state?.p1Name || '') : (state?.p2Name || '');
  $('modal-deck').value = isLeft ? (state?.p1Deck || '') : (state?.p2Deck || '');
  renderDeckPresetChips();
  $('player-modal').classList.add('open');
}
function closePlayerModal() { $('player-modal').classList.remove('open'); modalSide = null; }
function openReportModal() { $('report-modal').classList.add('open'); }
function closeReportModal() { $('report-modal').classList.remove('open'); }
function openAdvancedModal() { manualScoreLeft = state?.scoreLeft || 0; manualScoreRight = state?.scoreRight || 0; renderManualScore(); $('advanced-modal').classList.add('open'); }
function closeAdvancedModal() { $('advanced-modal').classList.remove('open'); }
async function requestFullscreenMode() {
  try {
    if (!document.fullscreenElement) await document.documentElement.requestFullscreen();
    if (screen.orientation?.lock) screen.orientation.lock('landscape').catch(() => {});
    setToast('전체화면 전환됨');
  } catch (e) {
    setToast('브라우저가 전체화면을 막았습니다.', true);
  }
}
async function savePlayerSetup() {
  if (!state || !modalSide || busy) return;
  const nextSettings = {};
  if (modalSide === 'left') {
    nextSettings.p1Name = $('modal-name').value.trim();
    nextSettings.p1Deck = $('modal-deck').value.trim();
  } else {
    nextSettings.p2Name = $('modal-name').value.trim();
    nextSettings.p2Deck = $('modal-deck').value.trim();
  }
  busy = true;
  try {
    const res = await fetch('/api/settings', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(nextSettings) });
    const result = await res.json();
    if (!result.ok) throw new Error(result.error || 'save failed');
    closePlayerModal();
    render(result.state);
    setToast('설정 저장됨');
  } catch (e) {
    setToast('설정 저장 실패', true);
    await loadState();
  } finally {
    busy = false;
    if (state) render(state);
  }
}
async function loadState() {
  if (busy || $('player-modal').classList.contains('open') || $('report-modal').classList.contains('open') || $('advanced-modal').classList.contains('open')) return;
  try {
    const res = await fetch('/api/state?_=' + Date.now());
    render(await res.json());
  } catch (e) {
    setToast('연결 없음', true);
  }
}
async function loadDeckPresets() {
  try {
    const res = await fetch('/api/deck-presets?_=' + Date.now());
    const result = await res.json();
    deckPresets = result.presets || [];
    $('deck-preset-list').innerHTML = deckPresets.map(p => `<option value="${escapeHtml(p.deckName)}"></option>`).join('');
    renderDeckPresetChips();
  } catch (e) {}
}
function renderDeckPresetChips() {
  const el = $('deck-preset-chips');
  if (!el) return;
  el.innerHTML = deckPresets.slice(0, 8).map(p => `<button type="button" onclick="selectDeckPreset('${escapeJs(p.deckName)}')">${escapeHtml(p.deckName)}</button>`).join('');
}
function selectDeckPreset(name) {
  $('modal-deck').value = name;
}
function escapeHtml(value) {
  return String(value || '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}
function escapeJs(value) {
  return String(value || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'");
}
async function sendAction(payload) {
  if (busy) return;
  busy = true;
  try {
    const res = await fetch('/api/action', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload) });
    const result = await res.json();
    if (!result.ok) throw new Error(result.error || 'action failed');
    render(result.state);
    setToast('반영됨');
  } catch (e) {
    setToast('처리 실패', true);
    await loadState();
  } finally {
    busy = false;
    if (state) render(state);
  }
}
function reportWinner(winner) { closeReportModal(); sendAction({ action:'set_win', winner }); }
function toggleJudgeCall() { sendAction({ action:'toggle_judge_call' }); }
function adjustManualScore(side, delta) {
  if (side === 'left') manualScoreLeft = Math.max(0, manualScoreLeft + delta);
  else manualScoreRight = Math.max(0, manualScoreRight + delta);
  renderManualScore();
}
function renderManualScore() {
  $('manual-left-score').textContent = manualScoreLeft;
  $('manual-right-score').textContent = manualScoreRight;
}
function applyManualScore() {
  sendAction({ action:'set_score', scoreLeft:manualScoreLeft, scoreRight:manualScoreRight });
}
$('player-modal').addEventListener('click', e => { if (e.target.id === 'player-modal') closePlayerModal(); });
$('report-modal').addEventListener('click', e => { if (e.target.id === 'report-modal') closeReportModal(); });
$('advanced-modal').addEventListener('click', e => { if (e.target.id === 'advanced-modal') closeAdvancedModal(); });
$('modal-name').addEventListener('keydown', e => { if (e.key === 'Enter') $('modal-deck').focus(); });
$('modal-deck').addEventListener('keydown', e => { if (e.key === 'Enter') savePlayerSetup(); });
loadState();
loadDeckPresets();
setInterval(loadState, 800);
setInterval(updateTimerDisplay, 250);
</script>
</body>
</html>
