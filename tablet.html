<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Marineford Tablet Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@500;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#07080d;
    --panel:#10131c;
    --panel2:#181c28;
    --gold:#c9a84c;
    --gold2:#eed16b;
    --text:#f7f7f4;
    --muted:rgba(247,247,244,.62);
    --line:rgba(201,168,76,.24);
    --red:#c93f46;
    --blue:#326bd4;
    --green:#2f9d69;
    --orange:#c96f2d;
  }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { margin:0; width:100%; min-height:100%; background:var(--bg); color:var(--text); font-family:'Noto Sans KR',sans-serif; }
  body { padding:14px; overflow:hidden; }
  .shell { height:calc(100vh - 28px); max-width:1120px; margin:0 auto; display:grid; grid-template-rows:auto 1fr auto; gap:12px; }
  .topbar { display:flex; justify-content:space-between; align-items:center; gap:14px; min-height:42px; }
  .brand { min-width:0; display:flex; align-items:baseline; gap:12px; }
  .brand strong { font-family:'Bebas Neue',sans-serif; font-size:30px; color:var(--gold2); letter-spacing:.08em; line-height:1; }
  .brand span { color:var(--muted); font-size:13px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .status { display:flex; align-items:center; gap:8px; flex-shrink:0; }
  .phase-chip, .conn { border:1px solid var(--line); border-radius:999px; padding:7px 11px; color:var(--muted); font-size:13px; font-weight:800; white-space:nowrap; }
  .phase-chip.dueling { color:#8be0af; border-color:rgba(47,157,105,.48); }
  .phase-chip.sideboarding { color:#ffbc73; border-color:rgba(201,111,45,.5); }
  .phase-chip.finished { color:#ff9299; border-color:rgba(201,63,70,.5); }
  .conn.ok { color:#8be0af; border-color:rgba(47,157,105,.48); }
  .conn.err { color:#ff9299; border-color:rgba(201,63,70,.5); }

  .setup-view { min-height:0; display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  .setup-card { border:1px solid var(--line); border-radius:10px; background:linear-gradient(180deg,#151925,#0c0f16); display:flex; flex-direction:column; justify-content:center; align-items:center; gap:20px; padding:26px; cursor:pointer; text-align:center; }
  .setup-card:active { transform:translateY(1px); }
  .setup-side { font-family:'Bebas Neue',sans-serif; color:var(--gold); font-size:clamp(42px,8vw,92px); letter-spacing:.08em; line-height:.9; }
  .setup-name { max-width:100%; font-size:clamp(30px,5vw,58px); font-weight:900; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .setup-hint { color:var(--muted); font-size:clamp(16px,2vw,22px); font-weight:800; }
  .setup-ready { color:#8be0af; }
  .setup-pending { color:#ffbc73; }
  .prestart-footer { display:grid; grid-template-columns:1fr auto; gap:12px; align-items:center; background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:14px; }
  .prestart-guide { color:var(--muted); font-size:14px; font-weight:800; padding-left:2px; }
  .primary-start { min-width:220px; min-height:66px; font-size:24px; background:var(--green); }

  .score-view { min-height:0; display:grid; grid-template-columns:minmax(0,1fr) auto minmax(0,1fr); align-items:center; gap:20px; padding:10px 8px 4px; }
  .side { min-width:0; height:100%; display:grid; grid-template-rows:auto 1fr; align-items:center; text-align:center; }
  .player-name { width:100%; min-height:38px; color:var(--muted); font-size:clamp(18px,2.6vw,32px); font-weight:900; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .score { font-family:'Bebas Neue',sans-serif; font-size:clamp(180px,34vw,390px); line-height:.76; letter-spacing:0; }
  .colon { font-family:'Bebas Neue',sans-serif; color:var(--gold); font-size:clamp(110px,18vw,210px); line-height:.75; padding-bottom:24px; }
  .match-dock { background:rgba(16,19,28,.96); border:1px solid var(--line); border-radius:10px; padding:12px; box-shadow:0 -10px 30px rgba(0,0,0,.28); }
  .report-open { width:100%; min-height:64px; font-size:24px; background:var(--gold); color:#191300; }
  .next-open { width:100%; min-height:64px; font-size:24px; background:var(--green); }

  button { min-height:42px; border:0; border-radius:7px; color:#fff; font-family:'Noto Sans KR',sans-serif; font-size:15px; font-weight:900; cursor:pointer; box-shadow:inset 0 -2px 0 rgba(0,0,0,.22); white-space:nowrap; }
  button:active { transform:translateY(1px); }
  button:disabled { opacity:.38; cursor:not-allowed; transform:none; }
  .blue { background:var(--blue); }
  .red { background:var(--red); }
  .green { background:var(--green); }
  .orange { background:var(--orange); }
  .ghost { background:var(--panel2); border:1px solid var(--line); color:var(--muted); box-shadow:none; }
  .toast { min-height:18px; color:var(--muted); text-align:center; font-size:12px; margin-top:8px; }

  .modal-backdrop { position:fixed; inset:0; display:none; align-items:center; justify-content:center; padding:20px; background:rgba(0,0,0,.72); z-index:30; }
  .modal-backdrop.open { display:flex; }
  .modal { width:min(560px,100%); background:#121622; border:1px solid var(--line); border-radius:12px; padding:22px; box-shadow:0 20px 60px rgba(0,0,0,.5); display:grid; gap:16px; }
  .modal.wide { width:min(720px,100%); }
  .modal-title { display:flex; justify-content:space-between; align-items:center; gap:12px; }
  .modal-title strong { font-size:24px; }
  .modal-title span { color:var(--muted); font-size:13px; font-weight:800; }
  .field { display:grid; gap:7px; }
  .field label { color:var(--muted); font-size:13px; font-weight:900; }
  .field input { width:100%; height:54px; border-radius:8px; border:1px solid var(--line); background:var(--panel2); color:var(--text); padding:0 14px; font:inherit; font-size:20px; font-weight:900; outline:none; }
  .field input:focus { border-color:var(--gold); box-shadow:0 0 0 3px rgba(201,168,76,.13); }
  .modal-actions { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .report-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .winner-button { min-height:94px; font-size:clamp(22px,3vw,34px); white-space:normal; line-height:1.15; padding:10px; }
  .report-tools { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; }
  .hidden { display:none !important; }

  @media (max-width:820px) {
    body { padding:10px; overflow:auto; }
    .shell { height:auto; min-height:calc(100vh - 20px); }
    .topbar { align-items:flex-start; }
    .brand { display:grid; gap:2px; }
    .status { display:grid; justify-items:end; }
    .setup-view { min-height:54vh; }
    .score-view { min-height:48vh; gap:10px; }
    .score { font-size:clamp(130px,31vw,260px); }
    .prestart-footer { grid-template-columns:1fr; }
    .report-tools { grid-template-columns:1fr; }
  }
  @media (max-width:560px) {
    .setup-view, .report-grid, .modal-actions { grid-template-columns:1fr; }
  }
</style>
</head>
<body>
<main class="shell">
  <header class="topbar">
    <div class="brand">
      <strong>MARINEFORD</strong>
      <span id="match-title">방송 테이블</span>
    </div>
    <div class="status">
      <div class="phase-chip" id="phase">대기중</div>
      <div class="conn" id="conn">연결 확인중</div>
    </div>
  </header>

  <section class="setup-view" id="setup-view">
    <button class="setup-card" type="button" onclick="openPlayerModal('left')">
      <div class="setup-side">LEFT</div>
      <div class="setup-name" id="left-setup-name">터치해서 설정</div>
      <div class="setup-hint" id="left-setup-hint">닉네임과 덱 이름 입력</div>
    </button>
    <button class="setup-card" type="button" onclick="openPlayerModal('right')">
      <div class="setup-side">RIGHT</div>
      <div class="setup-name" id="right-setup-name">터치해서 설정</div>
      <div class="setup-hint" id="right-setup-hint">닉네임과 덱 이름 입력</div>
    </button>
  </section>

  <section class="score-view hidden" id="score-view">
    <div class="side">
      <div class="player-name" id="left-name">왼쪽</div>
      <div class="score" id="left-score">0</div>
    </div>
    <div class="colon">:</div>
    <div class="side">
      <div class="player-name" id="right-name">오른쪽</div>
      <div class="score" id="right-score">0</div>
    </div>
  </section>

  <footer class="prestart-footer" id="prestart-footer">
    <div class="prestart-guide">양쪽 플레이어가 자신의 패널을 터치해 닉네임과 덱 이름을 입력합니다. 덱 이름은 경기 중 화면에 표시되지 않습니다.</div>
    <button class="primary-start" id="prestart-start" onclick="sendAction({action:'start_duel'})">듀얼 시작</button>
  </footer>

  <footer class="match-dock hidden" id="match-dock">
    <button class="report-open" id="report-open" onclick="openReportModal()">승패 보고</button>
    <button class="next-open hidden" id="next-open" onclick="sendAction({action:'start_duel'})">다음 듀얼 시작</button>
    <div class="toast" id="toast"></div>
  </footer>
</main>

<div class="modal-backdrop" id="player-modal">
  <div class="modal">
    <div class="modal-title">
      <strong id="modal-title">플레이어 설정</strong>
      <span>덱 이름은 방송 화면에 표시되지 않습니다.</span>
    </div>
    <div class="field">
      <label for="modal-name">닉네임</label>
      <input id="modal-name" type="text" autocomplete="off" placeholder="방송에 표시될 이름">
    </div>
    <div class="field">
      <label for="modal-deck">덱 이름</label>
      <input id="modal-deck" type="text" autocomplete="off" placeholder="편집/운영 기록용">
    </div>
    <div class="modal-actions">
      <button class="ghost" onclick="closePlayerModal()">닫기</button>
      <button class="green" id="modal-save" onclick="savePlayerSetup()">저장</button>
    </div>
  </div>
</div>

<div class="modal-backdrop" id="report-modal">
  <div class="modal wide">
    <div class="modal-title">
      <strong>승패 보고</strong>
      <span>세트가 끝났을 때 승자를 선택합니다.</span>
    </div>
    <div class="report-grid">
      <button class="blue winner-button" id="report-left-win" onclick="reportWinner('left')">왼쪽 승</button>
      <button class="red winner-button" id="report-right-win" onclick="reportWinner('right')">오른쪽 승</button>
    </div>
    <div class="report-tools">
      <button class="ghost" onclick="sendAction({action:'undo'}); closeReportModal();">마지막 보고 취소</button>
      <button class="ghost" id="report-left-edit" onclick="openPlayerModal('left')">플레이어 정보 수정</button>
      <button class="ghost" id="report-right-edit" onclick="openPlayerModal('right')">플레이어 정보 수정</button>
    </div>
    <div class="modal-actions">
      <button class="ghost" onclick="closeReportModal()">닫기</button>
      <button class="orange" id="finish-match" onclick="sendAction({action:'finish_match'}); closeReportModal();">매치 종료</button>
    </div>
  </div>
</div>

<script>
let state = null;
let busy = false;
let modalSide = null;

const phaseLabels = {
  idle: '대기중',
  dueling: '듀얼중',
  sideboarding: '사이드덱 교체중',
  finished: '매치 종료'
};

function $(id) { return document.getElementById(id); }

function setToast(message, isError = false) {
  const el = $('toast');
  if (!el) return;
  el.textContent = message || '';
  el.style.color = isError ? '#ff9a9a' : 'rgba(247,247,244,.62)';
  clearTimeout(el._timer);
  if (message) el._timer = setTimeout(() => { el.textContent = ''; }, 1800);
}

function updateConn(ok) {
  const el = $('conn');
  el.textContent = ok ? '연결됨' : '연결 끊김';
  el.classList.toggle('ok', ok);
  el.classList.toggle('err', !ok);
}

function isPrestart(s) {
  return (s.phase || 'idle') === 'idle' && (s.scoreLeft ?? 0) === 0 && (s.scoreRight ?? 0) === 0;
}

function render(s) {
  state = s;
  const phase = s.phase || 'idle';
  const prestart = isPrestart(s);
  $('match-title').textContent = s.tournamentName || s.roundName || '방송 테이블';
  $('phase').textContent = prestart ? '경기 전 설정' : `${phaseLabels[phase] || phaseLabels.idle} · ${s.currentSet || 1}세트`;
  $('phase').className = 'phase-chip ' + phase;

  $('setup-view').classList.toggle('hidden', !prestart);
  $('prestart-footer').classList.toggle('hidden', !prestart);
  $('score-view').classList.toggle('hidden', prestart);
  $('match-dock').classList.toggle('hidden', prestart);

  renderSetupCard('left', s.p1Name, s.p1Deck);
  renderSetupCard('right', s.p2Name, s.p2Deck);

  const leftName = s.p1Name || '왼쪽';
  const rightName = s.p2Name || '오른쪽';
  $('left-name').textContent = leftName;
  $('right-name').textContent = rightName;
  $('left-score').textContent = s.scoreLeft ?? 0;
  $('right-score').textContent = s.scoreRight ?? 0;

  const isDueling = phase === 'dueling';
  const isSideboarding = phase === 'sideboarding';
  const isFinished = phase === 'finished';
  $('prestart-start').disabled = busy || !s.p1Name || !s.p1Deck || !s.p2Name || !s.p2Deck;
  $('report-open').classList.toggle('hidden', !isDueling);
  $('next-open').classList.toggle('hidden', !isSideboarding);
  $('report-open').disabled = busy || !isDueling;
  $('next-open').disabled = busy || !isSideboarding;
  $('report-left-win').textContent = `${leftName} 승`;
  $('report-right-win').textContent = `${rightName} 승`;
  $('report-left-edit').textContent = `${leftName} 정보 수정`;
  $('report-right-edit').textContent = `${rightName} 정보 수정`;
  $('report-left-win').disabled = busy || !isDueling;
  $('report-right-win').disabled = busy || !isDueling;
  $('finish-match').disabled = busy || isFinished;
}

function renderSetupCard(side, name, deck) {
  const nameEl = $(`${side}-setup-name`);
  const hintEl = $(`${side}-setup-hint`);
  nameEl.textContent = name || '터치해서 설정';
  if (name && deck) {
    hintEl.textContent = '설정 완료 · 터치해서 수정';
    hintEl.className = 'setup-hint setup-ready';
  } else if (name) {
    hintEl.textContent = '덱 이름 입력 필요 · 터치해서 수정';
    hintEl.className = 'setup-hint setup-pending';
  } else {
    hintEl.textContent = '닉네임과 덱 이름 입력';
    hintEl.className = 'setup-hint setup-pending';
  }
}

function openPlayerModal(side) {
  closeReportModal();
  modalSide = side;
  const isLeft = side === 'left';
  const currentName = isLeft ? state?.p1Name : state?.p2Name;
  $('modal-title').textContent = currentName
    ? `${currentName} 정보 수정`
    : (isLeft ? '왼쪽 플레이어 설정' : '오른쪽 플레이어 설정');
  $('modal-name').value = isLeft ? (state?.p1Name || '') : (state?.p2Name || '');
  $('modal-deck').value = isLeft ? (state?.p1Deck || '') : (state?.p2Deck || '');
  $('player-modal').classList.add('open');
  setTimeout(() => $('modal-name').focus(), 0);
}

function closePlayerModal() {
  $('player-modal').classList.remove('open');
  modalSide = null;
}

function openReportModal() {
  $('report-modal').classList.add('open');
}

function closeReportModal() {
  $('report-modal').classList.remove('open');
}

function reportWinner(winner) {
  closeReportModal();
  sendAction({ action: 'set_win', winner });
}

async function savePlayerSetup() {
  if (!state || !modalSide || busy) return;
  const name = $('modal-name').value.trim();
  const deck = $('modal-deck').value.trim();
  const nextState = { ...state };
  if (modalSide === 'left') {
    nextState.p1Name = name;
    nextState.p1Deck = deck;
  } else {
    nextState.p2Name = name;
    nextState.p2Deck = deck;
  }

  busy = true;
  try {
    const res = await fetch('/api/state', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(nextState)
    });
    const result = await res.json();
    if (!result.ok) throw new Error(result.error || 'save failed');
    closePlayerModal();
    render(result.state);
    updateConn(true);
    setToast('설정 저장됨');
  } catch (e) {
    setToast('설정 저장 실패', true);
    await loadState();
  } finally {
    busy = false;
    if (state) render(state);
  }
}

async function loadState() {
  if (busy || $('player-modal').classList.contains('open') || $('report-modal').classList.contains('open')) return;
  try {
    const res = await fetch('/api/state?_=' + Date.now());
    const next = await res.json();
    updateConn(true);
    render(next);
  } catch (e) {
    updateConn(false);
  }
}

async function sendAction(payload) {
  if (busy) return;
  busy = true;
  if (state) render(state);
  try {
    const res = await fetch('/api/action', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    const result = await res.json();
    if (!result.ok) throw new Error(result.error || 'action failed');
    render(result.state);
    updateConn(true);
    setToast('반영됨');
  } catch (e) {
    setToast('처리 실패', true);
    await loadState();
  } finally {
    busy = false;
    if (state) render(state);
  }
}

$('player-modal').addEventListener('click', (event) => {
  if (event.target.id === 'player-modal') closePlayerModal();
});
$('report-modal').addEventListener('click', (event) => {
  if (event.target.id === 'report-modal') closeReportModal();
});
$('modal-name').addEventListener('keydown', (event) => {
  if (event.key === 'Enter') $('modal-deck').focus();
});
$('modal-deck').addEventListener('keydown', (event) => {
  if (event.key === 'Enter') savePlayerSetup();
});

loadState();
setInterval(loadState, 800);
</script>
</body>
</html>
